data_dir = "/var/lib/vector"

# Container stdout (not under /var/log; captured via docker API) and host metrics.
[sources.docker]
type = "docker_logs"

[sources.host]
type = "host_metrics"
scrape_interval_secs = 60
collectors = ["cpu", "memory", "filesystem", "load"]

# Frog's eye watches the WHOLE /var/log tree. Every process writes a file under /var/log
# (project processes: /var/log/observe/app/*.log). No content filtering or throttling — noise
# is fixed at the source, not hidden. Excludes only unreadable files (binaries, compressed/
# rotated, the journal binary dir) and our own JSONL sinks + compactor log (feedback loops).
[sources.varlog]
type = "file"
include = ["/var/log/**"]
exclude = [
  "/var/log/observe/*.jsonl",
  "/var/log/observe/compactor.log",
  "/var/log/journal/**",
  "/var/log/**/*.gz",
  "/var/log/**/*.[0-9]",
  "/var/log/**/*.[0-9][0-9]",
  "/var/log/btmp", "/var/log/wtmp", "/var/log/lastlog", "/var/log/faillog",
]
ignore_older_secs = 600

[transforms.host_as_log]
type = "metric_to_log"
inputs = ["host"]

[sinks.docker_jsonl]
type = "file"
inputs = ["docker"]
path = "/var/log/observe/docker.jsonl"
encoding.codec = "json"

[sinks.host_jsonl]
type = "file"
inputs = ["host_as_log"]
path = "/var/log/observe/host_metrics.jsonl"
encoding.codec = "json"

[sinks.app_logs_jsonl]
type = "file"
inputs = ["varlog"]
path = "/var/log/observe/app_logs.jsonl"
encoding.codec = "json"
