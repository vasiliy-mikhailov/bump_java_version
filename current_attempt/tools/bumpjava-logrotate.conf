# P10/P6: rotate the project's app logs centralized under /var/log/observe/app.
# Runs in user space (no root): logrotate -s <user-state> <this-file>, driven by cron.
# copytruncate so long-running nohup'd writers (build, dig, keepalives) keep their open fd.
/var/log/observe/app/*.log {
    rotate 5
    size 200M
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
    nodateext
}
