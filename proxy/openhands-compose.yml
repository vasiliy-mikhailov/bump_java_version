services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.6
    container_name: openhands
    restart: unless-stopped
    pull_policy: never
    environment:
      # Point OpenHands at our local vLLM Qwen
      SANDBOX_RUNTIME_CONTAINER_IMAGE: docker.openhands.dev/openhands/runtime:1.6-nikolaik
      LOG_ALL_EVENTS: "true"
      # LLM config — OpenAI-compatible endpoint
      LLM_MODEL: openai/qwen3.6-27b-fp8
      LLM_BASE_URL: https://inference.mikhailov.tech/v1
      LLM_API_KEY: ${VLLM_API_KEY}
      # Workspace mount inside the OpenHands runtime
      WORKSPACE_BASE: /home/vmihaylov/java_8_11_17_to_java_21
      SANDBOX_VOLUMES: /home/vmihaylov/java_8_11_17_to_java_21:/workspace:rw
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-state:/.openhands-state
      - /home/vmihaylov/java_8_11_17_to_java_21:/workspace
    env_file:
      - /home/vmihaylov/java_8_11_17_to_java_21/.env
    networks:
      - proxy-net
    # OpenHands exposes the UI/API on port 3000 inside the container
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3000"

volumes:
  openhands-state:

networks:
  proxy-net:
    external: true
